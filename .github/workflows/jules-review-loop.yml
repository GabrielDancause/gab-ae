name: Jules Review Loop

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch: {}     # Manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  review-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run review loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          D1_DATABASE_ID: '4e23e386-b430-4ffc-bf84-246a4e7bcdd1'
        run: node .github/scripts/jules-review-loop.js

      - name: Commit state
        run: |
          git config user.name "David (agent)"
          git config user.email "david@gab.ae"
          git pull --rebase origin main || true
          git add .github/state/heartbeat-state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update review loop state"
            git push || git pull --rebase origin main && git push
          fi
